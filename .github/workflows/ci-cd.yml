name: PITAP Data Pipeline CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy pyarrow

    - name: Run ETL Pipeline & Validate Governance Gates
      run: |
        python etl_pipeline.py

    - name: Verify Governance Audit Logs
      run: |
        ls -la /tmp/pitap-datalake/governance/
        cat /tmp/pitap-datalake/governance/*.json

- name: Run ETL Pipeline & Validate Governance Gates
      run: |
        python etl_pipeline.py

    - name: Run n8n Workflow Automation Engine
      run: |
        python n8n_workflow_equivalent.py

    - name: Verify Governance Audit Logs
      run: |
        ls -la /tmp/pitap-datalake/governance/
        cat /tmp/pitap-datalake/governance/*.json
